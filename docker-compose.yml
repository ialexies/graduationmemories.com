services:
  graduationmemories:
    build: .
    container_name: graduationmemories
    restart: unless-stopped
    ports:
      - "8084:3000"
    volumes:
      - graduationmemories-data:/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/data/gradmemories.db
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}

volumes:
  graduationmemories-data:
